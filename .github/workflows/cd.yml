name: Continuous Deployment

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup node for npmjs.org as registry
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies 🔧
        run: yarn install --frozen-lockfile

      - name: Build 🏗️
        run: yarn build

      - name: Set npm publish tag
        id: npm_tag
        run: |
          if [[ "${{ github.event.release.tag_name }}" == *"-rc"* ]]; then
            echo "tag=next" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: NPM PKG Publish 🎉
        run: yarn workspaces foreach -t --exclude '{embla-carousel-monorepo,embla-carousel-website,embla-carousel-playground-vanilla,embla-carousel-playground-react,embla-carousel-playground-solid,embla-carousel-playground-vue,embla-carousel-playground-svelte}' npm publish --tag ${{ steps.npm_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
